# fly.toml app configuration file generated for cognitrix on 2026-07-05T17:06:26Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cognitrix'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  COGNITRIX_ENV = 'production'
  DISABLE_VECTOR_STORE = 'true'

[[mounts]]
  source = 'cognitrix_data'
  destination = '/root/.cognitrix'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '40s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 2048
